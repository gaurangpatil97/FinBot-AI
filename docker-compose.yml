networks:
  finbot-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  hf-cache:

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finbot-backend
    env_file:
      - .env
    environment:
      - TMP_DIR=/app/tmp_images
    volumes:
      - ./backend/chroma_store:/app/chroma_store
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/companies.json:/app/companies.json
      - ./backend/sessions.db:/app/sessions.db
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    networks:
      - finbot-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: finbot-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - finbot-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: finbot-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    networks:
      - finbot-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: finbot-grafana
    depends_on:
      - prometheus
      - loki
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    networks:
      - finbot-network
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: finbot-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - finbot-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: finbot-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./backend/logs:/var/log/finbot:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - finbot-network
    restart: unless-stopped
