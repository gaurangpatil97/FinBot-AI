server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: finbot_backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: finbot
          __path__: /var/log/finbot/finbot.json

    pipeline_stages:
      - json:
          expressions:
            level: record.level.name
            message: record.message
            module: record.module
            function: record.function
            timestamp: record.time.timestamp

      - labels:
          level:
          module:

      - timestamp:
          source: timestamp
          format: Unix
          # timestamp is a float (epoch seconds); Promtail's Unix format
          # expects an integer string — if this fails, fall back to no
          # timestamp stage and let Promtail use ingestion time.

      - output:
          source: message
